name: Validate

# Adapted from trailofbits/skills .github/workflows/validate.yml.
# Differences from the ToB template:
#   - Triggers target `master` (mbailey/skills' default branch), not `main`
#     -- consistent with lint.yml; `main` would mean CI never gates.
#   - SKILL.md frontmatter + hardcoded-path + email checks: kept, but scoped to
#     the repo root (ToB scans plugins/; mbailey/skills has no plugins/ dir --
#     plugins are external url-source entries). Hardcoded-path regex is verbatim.
#   - Personal-email check adapted to the canonical owner mike@failmode.com
#     (matches .claude-plugin/marketplace.json).
#   - validate_plugin_metadata.py replaced by validate_marketplace.py: a minimal
#     sanity check of our url-source marketplace.json (no in-repo plugin.json to
#     cross-check). See .github/scripts/validate_marketplace.py.
#   - ToB's "Validate Codex skill mappings" step omitted: .codex dual-
#     distribution is deferred (see SKF-8 README Notes).
#   - Added a non-blocking `security-scan` job running the vendored
#     scripts/scan_plugin.py (from trailofbits/skills-curated). It is
#     INFORMATIONAL ONLY (continue-on-error + never exits non-zero): there are
#     no bundled plugin dirs yet, so it self-skips when plugins/ is absent and
#     activates automatically once skills are bundled under plugins/. ToB's
#     full security-scan.yml (PR-comment bot, label triggers) is intentionally
#     not adopted yet -- overkill until there is something to scan.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate marketplace and skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Validate SKILL.md frontmatter
        run: |
          echo "Checking SKILL.md frontmatter..."
          python3 -c "
          import os
          import re
          import sys

          errors = []
          skill_count = 0

          for root, dirs, files in os.walk('.'):
              if '.git' in dirs:
                  dirs.remove('.git')
              for f in files:
                  if f == 'SKILL.md':
                      path = os.path.join(root, f)
                      skill_count += 1
                      with open(path) as fp:
                          content = fp.read()

                      if not content.startswith('---'):
                          errors.append(f'{path}: missing YAML frontmatter')
                          continue

                      match = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
                      if not match:
                          errors.append(f'{path}: malformed frontmatter')
                          continue

                      frontmatter = match.group(1)

                      if 'name:' not in frontmatter:
                          errors.append(f'{path}: missing \"name\" in frontmatter')
                      if 'description:' not in frontmatter:
                          errors.append(f'{path}: missing \"description\" in frontmatter')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}', file=sys.stderr)
              sys.exit(1)

          print(f'All {skill_count} SKILL.md files have valid frontmatter')
          "

      - name: Check for hardcoded paths
        run: |
          echo "Checking for hardcoded user paths..."
          # Regex verbatim from ToB. Exclude /path/to (example paths) and
          # /home/vscode (standard devcontainer user).
          if grep -rPn '(?<![a-zA-Z])(/home/[a-z]|/Users/[A-Z])' . --include='*.md' --include='*.py' --include='*.json' | grep -v '/path/to' | grep -v '/home/vscode'; then
            echo "ERROR: Found hardcoded user paths (see above)"
            exit 1
          fi
          echo "No hardcoded user paths found"

      - name: Check for personal emails
        run: |
          echo "Checking for personal emails..."
          # Canonical owner email is mike@failmode.com (see marketplace.json).
          if grep -r '@failmode\.com' . --include='*.json' --include='*.toml' | grep -v 'mike@failmode.com' | grep -v '.git'; then
            echo "ERROR: Found personal emails (should use mike@failmode.com)"
            exit 1
          fi
          echo "No personal emails found"

      - name: Validate marketplace.json
        run: python3 .github/scripts/validate_marketplace.py

  security-scan:
    name: Plugin security scan (informational)
    runs-on: ubuntu-latest
    # Informational only -- this job must never gate merges. There are no
    # bundled plugin dirs yet; the scanner self-skips when plugins/ is absent
    # and starts producing output once skills are bundled under plugins/.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Run vendored scan_plugin.py (non-blocking)
        run: |
          set +e
          if [ -d plugins ]; then
            echo "Scanning plugins/ (informational -- does NOT gate CI)"
            uv run scripts/scan_plugin.py plugins/
            echo "scan_plugin.py exit code: $? (0 clean / 2 BLOCK / 3 WARN)"
          else
            echo "No plugins/ directory yet -- nothing to scan."
            echo "The scanner is vendored at scripts/scan_plugin.py and this"
            echo "job activates automatically once bundled plugin dirs land"
            echo "under plugins/. Run it locally with:"
            echo "  uv run scripts/scan_plugin.py <plugin-dir>"
          fi
          exit 0
